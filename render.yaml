services:
  - type: web
    name: pre-loved
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@11.15.1 --activate && pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm exec prisma migrate deploy && node .output/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: VITE_FORMSPREE_FORM_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
